# Render Blueprint — Backend Meritum (Fastify + Prisma + PostgreSQL)
# Docs: https://render.com/docs/blueprint-spec
#
# O frontend NÃO entra aqui: ele é hospedado no Vercel (veja Codigo/Frontend/vercel.json).
# Este blueprint sobe a API + um PostgreSQL gerenciado a partir do Dockerfile existente.

services:
  - type: web
    name: meritum-backend
    runtime: docker
    rootDir: Codigo/Backend          # contexto do build = pasta do Dockerfile
    dockerfilePath: ./Dockerfile     # entrypoint.sh roda "prisma migrate deploy" e depois "npm run start"
    plan: free                       # TROQUE para "starter" em produção: o plano free dorme após 15 min de inatividade
    region: oregon                   # ajuste para a região mais próxima (ex.: ohio, frankfurt, singapore)
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3333"
      - key: JWT_SECRET
        generateValue: true          # Render gera um segredo forte automaticamente
      - key: DATABASE_URL
        fromDatabase:
          name: meritum-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false                  # preencha no painel com a URL do Vercel (ex.: https://meritum.vercel.app)
      - key: CORS_ORIGINS
        sync: false                  # OBRIGATÓRIO: URL(s) do frontend permitidas, separadas por vírgula (ex.: https://meritum.vercel.app)
      - key: ADMIN_EMAIL
        value: admin@meritum.com     # e-mail de login do admin criado no seed
      - key: ADMIN_PASSWORD
        sync: false                  # OBRIGATÓRIO p/ criar o admin em produção: defina uma senha FORTE no painel
      # --- Opcionais ---
      - key: RABBITMQ_URL
        sync: false                  # deixe vazio no plano free (consumers exigem serviço sempre-ligado); use CloudAMQP no plano pago
      # --- E-mail transacional ---
      # ATENÇÃO: o Render bloqueia as portas SMTP (25/465/587) no plano free. Use o Resend (API HTTP/443).
      - key: RESEND_API_KEY
        sync: false                  # crie em https://resend.com/api-keys; sem ela o app usa Ethereal (não entrega e-mail real)
      - key: MAIL_FROM
        sync: false                  # remetente; com Resend use um domínio verificado ou "Meritum <onboarding@resend.dev>" p/ teste
      # SMTP abaixo é fallback (só funciona em plano pago/fora do Render); deixe vazio ao usar Resend.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_PORT
        sync: false

databases:
  - name: meritum-db
    plan: free                       # ATENÇÃO: Postgres free do Render expira após ~30 dias. Para produção use plano pago ou Neon/Supabase (preencha DATABASE_URL manualmente).
    databaseName: meritum
    user: meritum
